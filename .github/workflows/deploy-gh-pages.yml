name: Deploy to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      publish_dir:
        description: '要发布的目录'
        required: false
        default: '.'
        type: string

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm install
      - run: npm run build

      - name: Create .nojekyll
        run: touch .nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ github.event.inputs.publish_dir || '.' }}
          destination_dir: '.'
          force_orphan: true
          commit_message: 'Deploy to GitHub Pages [skip ci]'
