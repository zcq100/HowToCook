name: Deploy to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm install
      - run: npm run build

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install MkDocs
        run: pip install mkdocs-material mkdocs-exclude

      - name: Setup docs directory
        run: |
          mkdir -p docs
          cp README.md docs/
          cp -r dishes docs/
          cp -r tips docs/

      - name: Generate index pages for categories
        run: |
          python3 -c "
          import os

          DOCS = 'docs'

          def make_index_for_dir(path):
              if not os.path.isdir(path):
                  return
              if os.path.exists(f'{path}/index.md') or os.path.exists(f'{path}/README.md'):
                  return
              items = sorted(os.listdir(path))
              md_files = []
              sub_dirs = []
              for item in items:
                  if item.startswith('.') or item == 'template':
                      continue
                  full = os.path.join(path, item)
                  if os.path.isdir(full):
                      sub_dirs.append(item)
                      make_index_for_dir(full)
                  elif item.endswith('.md'):
                      md_files.append(item)
              if not md_files and not sub_dirs:
                  return
              lines = []
              rel = os.path.relpath(path, DOCS)
              cat_name = os.path.basename(path)
              lines.append(f'# {cat_name}\n')
              if sub_dirs:
                  lines.append('## 分类\n')
                  for d in sub_dirs:
                      lines.append(f'- [{d}]({d}/)\n')
              if md_files:
                  lines.append('## 菜谱\n')
                  for f in md_files:
                      name = f.replace('.md', '')
                      lines.append(f'- [{name}]({f})\n')
              with open(f'{path}/index.md', 'w') as f:
                  f.writelines(lines)

          # Generate indexes for dishes/ categories
          for cat in os.listdir(f'{DOCS}/dishes'):
              if cat == 'template':
                  continue
              make_index_for_dir(f'{DOCS}/dishes/{cat}')

          # Generate indexes for tips/ subdirectories
          for tips_dir in ['advanced', 'learn']:
              make_index_for_dir(f'{DOCS}/tips/{tips_dir}')
          "

      - name: Build site
        run: mkdocs build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site
          destination_dir: '.'
          force_orphan: true
          commit_message: 'Deploy to GitHub Pages [skip ci]'
